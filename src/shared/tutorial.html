<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
                name="description"
                content="Tutorial for TORPEDO. Different examples to understand how it works."
        />
        <meta name="robots" content="index, follow" />
        <link rel="stylesheet" href="css/all.min.css" />
        <link rel="stylesheet" href="css/tutorial/tutorial.css" />
        <link rel="icon" href="img/icon64.png" />
        <title>TORPEDO Tutorial</title>
        <script src="js/browser-polyfill.min.js"></script>
        <script src="js/tutorial.js"></script>
    </head>

    <body>
        <header>
            <div class="header-wrapper">
                <h1 class="torpedo-title-wrapper">
                    <img id="torpedo-title" src="img/TORPEDO_fullLockup.svg" alt="TORPEDO" />
                </h1>

                <nav class="overview" aria-label="Tutorial navigation">
                    <button class="overview-case welcome not-colored" data-page-name="welcome" aria-label="Welcome">
                        <i class="fas fa-hand-paper angled" aria-hidden="true"></i>
                    </button>

                    <button class="overview-case explanation not-colored" data-page-name="explanation" aria-label="Explanation">
                        <i class="fas fa-info-circle" aria-hidden="true"></i>
                    </button>

                    <button class="overview-case tooltip not-colored" data-page-name="tooltip" aria-label="Tooltip">
                        <i class="fas fa-info-circle" aria-hidden="true"></i>
                    </button>

                    <button class="overview-case green-case" data-page-name="green-case" aria-label="Green case"></button>
                    <button class="overview-case green-case-showcase" data-page-name="green-case-showcase" aria-label="Green case showcase"></button>
                    <button class="overview-case grey-case" data-page-name="grey-case" aria-label="Grey case"></button>
                    <button class="overview-case grey-case-two" data-page-name="grey-case-two" aria-label="Grey case two"></button>
                    <button class="overview-case grey-case-showcase" data-page-name="grey-case-showcase" aria-label="Grey case showcase"></button>
                    <button class="overview-case warning-grey-case" data-page-name="warning-grey-case" aria-label="Warning grey case"></button>
                    <button class="overview-case warning-grey-case-showcase" data-page-name="warning-grey-case-showcase" aria-label="Warning grey case showcase"></button>

                    <button class="overview-case configuration" data-page-name="configuration" aria-label="Configuration">
                        <i class="fas fa-cog" aria-hidden="true"></i>
                    </button>
                </nav>
            </div>
        </header>

        <main class="tut-content-wrapper">
            <div class="tut-content">

                <!-- Page 1: Welcome -->
                <div class="welcome card">
                    <h2 id="welcome-title"></h2>
                    <p id="introduction-txt"></p>
                    <p id="introduction-txt-2"></p>
                </div>

                <!-- Page 2: Explanation -->
                <div class="explanation card off">
                    <h2 id="explanation-title"></h2>
                    <p id="explanation-txt"></p>
                    <p id="explanation-txt-2"></p>
                    <p class="link-like">https://www.web.<span class="domain-mark">knownpage.com</span>/dshfgfgdf</p>
                    <p class="link-like">https://<span class="domain-mark">example.com</span>/shfgsdsa/safd</p>
                </div>

                <!-- Page 3: Tooltip -->
                <div class="tooltip card off">
                    <h2 id="tooltip-title"></h2>
                    <p id="tooltip-txt"></p>
                </div>

                <!-- Page 4: Green case -->
                <div class="green-case card off">
                    <h2 id="green-case-title"></h2>
                    <p id="green-case-txt"></p>
                </div>

                <!-- Page 5: Green case with showcase -->
                <div class="green-case-showcase off">
                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="green-case-showcase-one-title"></h2>
                            <p id="green-case-showcase-one-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="green-case-showcase-one-img" class="case-img-summary" />
                        </div>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="green-case-showcase-two-title"></h2>
                            <p id="green-case-showcase-two-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="green-case-showcase-two-img" class="case-img-summary" />
                        </div>
                    </div>
                </div>

                <!-- Page 6: Grey case -->
                <div class="grey-case card off">
                    <h2 id="grey-case-title"></h2>
                    <p id="grey-case-txt"></p>
                    <p id="grey-case-txt-2"></p>
                </div>

                <!-- Page 7: Grey case two -->
                <div class="grey-case-two card off">
                    <h2 id="grey-case-two-title"></h2>
                    <p id="grey-case-two-txt"></p>
                    <p id="grey-case-two-txt-2"></p>
                    <p id="grey-case-two-txt-3"></p>

                    <p><span class="link-like">example.com</span> -&gt; <span class="link-like">exampel.com</span> (invertierte Buchstaben, <span class="fat">el</span> statt <span class="fat">le</span>)</p>
                    <p><span class="link-like">example.com</span> -&gt; <span class="link-like">exampie.com</span> (ähnlich aussehender Buchstabe, <span class="fat">i</span> statt <span class="fat">I</span>)</p>
                    <p><span class="link-like">example.com</span> -&gt; <span class="link-like">exaample.com</span> (ein zusätzliches Zeichen, zwei <span class="fat">a</span> statt eines)</p>

                    <p id="grey-case-two-txt-4"></p>
                </div>

                <!-- Page 8: Grey case with showcases -->
                <div class="grey-case-showcase off">
                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="grey-case-showcase-one-title"></h2>
                            <p id="grey-case-showcase-one-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="grey-case-showcase-one-img" class="case-img-summary" />
                        </div>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="grey-case-showcase-two-title"></h2>
                            <p id="grey-case-showcase-two-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="grey-case-showcase-two-img" class="case-img-summary" />
                        </div>
                    </div>
                </div>

                <!-- Page 9: Warning Grey case -->
                <div class="warning-grey-case card off">
                    <h2 id="warning-grey-case-title"></h2>
                    <p id="warning-grey-case-txt"></p>
                    <p id="warning-grey-case-txt-2"></p>
                </div>

                <!-- Page 10: Warning Grey case showcases -->
                <div class="warning-grey-case-showcase off">
                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="warning-grey-case-showcase-one-title"></h2>
                            <p id="warning-grey-case-showcase-one-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="warning-grey-case-showcase-one-img" class="case-img-summary" />
                        </div>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="warning-grey-case-showcase-two-title"></h2>
                            <p id="warning-grey-case-showcase-two-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="warning-grey-case-showcase-two-img" class="case-img-summary" />
                        </div>
                    </div>
                </div>

                <!-- configuration -->
                <div class="configuration off">
                    <div class="card">
                        <h2 id="configuration-title"></h2>
                        <p id="configuration-txt"></p>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <p id="configuration-showcase-three-txt"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="configuration-showcase-three-img" class="case-img-summary" />
                        </div>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card show-case-card">
                            <img src="" alt="" id="configuration-showcase-one-img" class="case-img-summary" />
                        </div>

                        <div class="card showcase-text">
                            <p id="configuration-showcase-one-txt"></p>
                        </div>
                    </div>

                    <div class="showcase-block txt-with-showcase">
                        <div class="card showcase-text">
                            <h2 id="configuration-showcase-two-title"></h2>
                            <p id="configuration-showcase-two-txt"></p>
                            <p id="configuration-showcase-two-txt-2"></p>
                            <p id="configuration-showcase-two-txt-3"></p>
                            <p id="configuration-showcase-two-txt-4"></p>
                            <p id="configuration-showcase-two-txt-5"></p>
                            <p id="configuration-showcase-two-txt-6"></p>
                        </div>

                        <div class="card show-case-card">
                            <img src="" alt="" id="configuration-showcase-two-img" class="case-img-summary" />
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <nav class="navigation-btns" aria-label="Page navigation">
            <button id="prev" aria-label="Previous page">
                <span class="btn-inner"><i class="fas fa-chevron-left" aria-hidden="true"></i></span>
            </button>

            <button id="next" aria-label="Next page">
                <span class="btn-inner"><i class="fas fa-chevron-right" aria-hidden="true"></i></span>
            </button>

            <button id="finish" class="disabled" aria-label="Close tutorial" aria-disabled="true">
                <span class="btn-inner"><i class="fas fa-times" aria-hidden="true"></i></span>
            </button>
        </nav>
    </body>
</html>
